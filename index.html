<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard รายการรถเช่า - สาขาหาดใหญ่</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* --- CSS ส่วนเดิมที่ปรับปรุงให้รองรับมือถือ --- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header { background: #ffffff; padding: 15px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 4px solid #1e40af; color: #1e3a8a; }
  .main { padding: 20px; }
  
  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .kpi-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; border-left: 5px solid #3b82f6; }
  .kpi-card .label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
  .kpi-card .value { font-size: 24px; font-weight: 800; color: #fff; }

  /* Table */
  .table-section { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #0f172a; color: #64748b; padding: 12px; text-align: left; }
  td { padding: 12px; border-bottom: 1px solid #0f172a; }
  tr.clickable:hover { background: #2d3748; cursor: pointer; }

  /* Detail Page Overlay */
  #detailPage { 
    display: none; position: fixed; inset: 0; z-index: 1000; 
    background: #0f172a; overflow-y: auto; padding-bottom: 50px;
  }
  #detailPage.active { display: block; }
  .detail-header { 
    background: #1e40af; padding: 15px 20px; display: flex; 
    align-items: center; gap: 15px; position: sticky; top: 0; 
  }
  .btn-back { 
    background: rgba(255,255,255,0.2); border: none; color: #fff; 
    padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;
  }
  .detail-content { max-width: 800px; margin: 20px auto; padding: 0 20px; }
  .info-box { 
    background: #1e293b; border-radius: 12px; padding: 20px; 
    margin-bottom: 15px; border: 1px solid #334155; 
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .info-item label { font-size: 11px; color: #64748b; display: block; text-transform: uppercase; }
  .info-item span { font-size: 15px; color: #e2e8f0; font-weight: 500; }
  
  .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .badge-expired { background: #7f1d1d; color: #fca5a5; }
  .badge-ok { background: #064e3b; color: #6ee7b7; }
</style>
</head>
<body>

<header>
  <div style="font-weight: 800; font-size: 20px;">KOMATSU FORKLIFT</div>
  <div style="flex:1; text-align: right; font-size: 12px;" id="last-update"></div>
</header>

<div id="detailPage">
  <div class="detail-header">
    <button class="btn-back" onclick="closeDetail()">← ย้อนกลับ</button>
    <div id="detail-title" style="font-weight:bold; font-size: 16px;"></div>
  </div>
  <div class="detail-content" id="detail-content">
    </div>
</div>

<div class="main">
  <div class="kpi-grid">
    <div class="kpi-card"><div class="label">จำนวนรถทั้งหมด</div><div class="value" id="kpi-total">0</div></div>
    <div class="kpi-card" style="border-left-color: #10b981;"><div class="label">รายได้รวม/เดือน</div><div class="value" id="kpi-revenue">0</div></div>
    <div class="kpi-card" style="border-left-color: #ef4444;"><div class="label">หมดสัญญา</div><div class="value" id="kpi-expired">0</div></div>
  </div>

  <div class="table-section">
    <div style="padding: 15px; background: #1e293b; border-bottom: 1px solid #334155;">
      <input type="text" id="search" placeholder="🔍 ค้นหาชื่อบริษัท..." oninput="filterTable()" 
             style="width:100%; padding:10px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#fff;">
    </div>
    <div style="overflow-x: auto;">
      <table id="mainTable">
        <thead>
          <tr>
            <th>#</th>
            <th>บริษัท</th>
            <th>รุ่น</th>
            <th>วันหมดสัญญา</th>
            <th>สถานะ</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1iFWpgZBXHa93M6iTlI5Xce4jTJVEy374tBDtHMKyCZI';
const SHEET_NAME = 'Sheet1';
let RAW_DATA = [];

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    
    // ดึงหัวตาราง
    const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
    
    // แปลงแถวเป็น Object
    RAW_DATA = json.table.rows.map((row, index) => {
      let obj = { _idx: index };
      row.c.forEach((cell, i) => {
        let val = cell ? (cell.f ? cell.f : cell.v) : '';
        obj[cols[i] || `col${i}`] = val;
      });
      return obj;
    });

    renderTable(RAW_DATA);
    updateKPIs(RAW_DATA);
    document.getElementById('last-update').innerText = 'อัปเดต: ' + new Date().toLocaleDateString('th-TH');
  } catch (e) {
    console.error("Error:", e);
    alert("โหลดข้อมูลไม่สำเร็จ กรุณาเช็คการแชร์ไฟล์ Google Sheet");
  }
}

function updateKPIs(data) {
  document.getElementById('kpi-total').innerText = data.length;
  const revenue = data.reduce((sum, item) => sum + (Number(String(item.price).replace(/,/g, '')) || 0), 0);
  document.getElementById('kpi-revenue').innerText = revenue.toLocaleString() + ' ฿';
  
  const today = new Date();
  const expiredCount = data.filter(item => {
    const end = new Date(item.end);
    return end < today;
  }).length;
  document.getElementById('kpi-expired').innerText = expiredCount;
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(item => {
    const days = calculateDays(item.end);
    const statusClass = days < 0 ? 'badge-expired' : 'badge-ok';
    const statusText = days < 0 ? 'หมดสัญญา' : 'ปกติ';
    
    return `
      <tr class="clickable" onclick="openDetail(${item._idx})">
        <td>${item.no || ''}</td>
        <td style="color:#60a5fa; font-weight:bold;">${item.company || ''}</td>
        <td><code>${item.model || ''}</code></td>
        <td>${item.end || ''}</td>
        <td><span class="badge ${statusClass}">${statusText}</span></td>
      </tr>
    `;
  }).join('');
}

function calculateDays(dateStr) {
  if(!dateStr) return 0;
  const end = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((end - today) / (1000 * 60 * 60 * 24));
}

// --- ฟังก์ชันกดแล้วไปหน้าข้อมูล (ที่แก้ไขใหม่) ---
function openDetail(idx) {
  const d = RAW_DATA.find(item => item._idx === idx);
  if (!d) return;

  // เขียนชื่อบริษัทที่หัวข้อ
  document.getElementById('detail-title').innerText = d.company || 'รายละเอียด';

  // เขียนเนื้อหาลงในหน้ารายละเอียด
  document.getElementById('detail-content').innerHTML = `
    <div class="info-box" style="border-left: 5px solid #60a5fa;">
      <h3 style="margin-bottom:15px; color:#60a5fa;">🏢 ข้อมูลลูกค้าและสัญญา</h3>
      <div class="info-grid">
        <div class="info-item"><label>ชื่อบริษัท</label><span>${d.company || '-'}</span></div>
        <div class="info-item"><label>จังหวัด</label><span>${d.province || '-'}</span></div>
        <div class="info-item"><label>เลขที่สัญญา</label><span>${d.contract_no || '-'}</span></div>
        <div class="info-item"><label>จำนวนงวด</label><span>${d.งวด || '-'} งวด</span></div>
        <div class="info-item"><label>วันเริ่มสัญญา</label><span>${d.start || '-'}</span></div>
        <div class="info-item"><label>วันสิ้นสุดสัญญา</label><span style="color:#f87171; font-weight:bold;">${d.end || '-'}</span></div>
      </div>
    </div>

    <div class="info-box" style="border-left: 5px solid #fbbf24;">
      <h3 style="margin-bottom:15px; color:#fbbf24;">🚜 รายละเอียดตัวรถ</h3>
      <div class="info-grid">
        <div class="info-item"><label>รุ่น (Model)</label><span>${d.model || '-'}</span></div>
        <div class="info-item"><label>เบอร์รถ (Car No.)</label><span style="font-size:18px; color:#fff;">${d.car_no || '-'}</span></div>
        <div class="info-item"><label>ประเภท</label><span>${d.new_used || '-'}</span></div>
        <div class="info-item"><label>อุปกรณ์เสริม</label><span>${d.accessories || '-'}</span></div>
        <div class="info-item"><label>เลขตัวถัง</label><span>${d.chassis_no || '-'}</span></div>
        <div class="info-item"><label>เลขเครื่อง</label><span>${d.engine_no || '-'}</span></div>
      </div>
    </div>

    <div class="info-box" style="border-left: 5px solid #10b981;">
      <h3 style="margin-bottom:15px; color:#10b981;">💰 ข้อมูลการเงิน</h3>
      <div class="info-grid">
        <div class="info-item"><label>ราคาเช่า/เดือน</label><span style="font-size:20px; color:#10b981; font-weight:bold;">${Number(String(d.price).replace(/,/g,'')).toLocaleString()} ฿</span></div>
        <div class="info-item"><label>สถานะวันคงเหลือ</label><span>${calculateDays(d.end)} วัน</span></div>
      </div>
    </div>
  `;

  // แสดงหน้า Detail
  document.getElementById('detailPage').classList.add('active');
  window.scrollTo(0,0);
}

function closeDetail() {
  document.getElementById('detailPage').classList.remove('active');
}

function filterTable() {
  const val = document.getElementById('search').value.toLowerCase();
  const filtered = RAW_DATA.filter(item => 
    (item.company || '').toLowerCase().includes(val) || 
    (item.car_no || '').toLowerCase().includes(val)
  );
  renderTable(filtered);
}

// เริ่มโหลดข้อมูล
fetchData();
</script>
</body>
</html>
